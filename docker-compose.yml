version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: distributedmq-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: distributedmq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nahidwin

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: distributedmq-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
